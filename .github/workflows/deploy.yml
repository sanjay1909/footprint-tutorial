name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Clone and build the footprint dependency
      - name: Clone footprint library
        run: git clone https://github.com/sanjay1909/footPrint.git ../footPrint
      - name: Install footprint dependencies
        run: cd ../footPrint && npm ci
      - name: Build footprint
        run: cd ../footPrint && npm run build

      # Update package.json to use the relative path for CI
      - name: Update footprint dependency path
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.dependencies.footprint = 'file:../footPrint';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - run: npm install
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
